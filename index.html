<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>思考記録</title>
<meta name="theme-color" content="#1F2937" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="思考記録" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<link rel="icon" href="./icon-192.png" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
  html, body { margin: 0; padding: 0; background: #EEF2F6; }
  .serif { font-family: 'Lora', Georgia, serif; }
  .intensity-range { -webkit-appearance: none; appearance: none; outline: none; height: 8px; border-radius: 9999px; width: 100%; }
  .intensity-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 9999px; background: #fff; border: 3px solid #1F2937; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
  .intensity-range::-moz-range-thumb { width: 18px; height: 18px; border-radius: 9999px; background: #fff; border: 3px solid #1F2937; cursor: pointer; }
  .intensity-range::-moz-range-track { height: 8px; border-radius: 9999px; background: transparent; }
</style>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/plain" id="app-source">
const { useState, useEffect } = React;

/* ---------- storage shim (localStorage, same contract as Claude artifact window.storage) ---------- */
window.storage = {
  async get(key) {
    const raw = localStorage.getItem(key);
    if (raw === null) throw new Error("not found");
    return { key, value: raw, shared: false };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value, shared: false };
  },
};

/* ---------- design tokens ---------- */
const C = {
  paper: "#EEF2F6",
  card: "#FFFFFF",
  ink: "#1F2937",
  inkSoft: "#5B6675",
  inkFaint: "#94A0AC",
  border: "#DCE3EA",
  cool: "#3E7C8C",
  warm: "#D17A5C",
  amber: "#C99A3E",
  amberBg: "#FBF3E3",
  danger: "#B5544A",
  dangerBg: "#FBEAE7",
};

/* ---------- icons (inline svg, no extra dependency) ---------- */
const IconBase = ({ size = 18, color = "currentColor", children }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>
);
const Plus = (p) => <IconBase {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></IconBase>;
const XIcon = (p) => <IconBase {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></IconBase>;
const ChevronLeft = (p) => <IconBase {...p}><polyline points="15 18 9 12 15 6" /></IconBase>;
const Trash2 = (p) => <IconBase {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></IconBase>;
const Pencil = (p) => <IconBase {...p}><path d="M12 20h9" /><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" /></IconBase>;
const Check = (p) => <IconBase {...p}><polyline points="20 6 9 17 4 12" /></IconBase>;
const DownloadIcon = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></IconBase>;
const UploadIcon = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></IconBase>;

/* ---------- helpers ---------- */
let idSeq = 0;
function genId() {
  idSeq += 1;
  return Date.now().toString(36) + "-" + idSeq + "-" + Math.random().toString(36).slice(2, 7);
}

function hexToRgb(hex) {
  const v = hex.replace("#", "");
  return { r: parseInt(v.substring(0, 2), 16), g: parseInt(v.substring(2, 4), 16), b: parseInt(v.substring(4, 6), 16) };
}
function gaugeColor(value) {
  const a = hexToRgb(C.cool);
  const b = hexToRgb(C.warm);
  const t = Math.max(0, Math.min(100, value)) / 100;
  const r = Math.round(a.r + (b.r - a.r) * t);
  const g = Math.round(a.g + (b.g - a.g) * t);
  const bl = Math.round(a.b + (b.b - a.b) * t);
  return `rgb(${r},${g},${bl})`;
}

function toDateInputValue(d = new Date()) {
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

function formatDateDisplay(value) {
  if (!value) return "";
  const d = new Date(value.length > 10 ? value : value + "T00:00:00");
  if (isNaN(d.getTime())) return value;
  const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
  return `${d.getMonth() + 1}月${d.getDate()}日(${weekdays[d.getDay()]})`;
}

function emptyFormData() {
  return {
    date: toDateInputValue(),
    situation: "",
    automaticThought: "",
    emotions: [{ id: genId(), name: "", value: 50 }],
    physicalReactions: [{ id: genId(), name: "" }],
    behavior: "",
    evidenceFor: "",
    evidenceAgainst: "",
    balancedThought: "",
  };
}

/* ---------- small UI pieces ---------- */
function Field({ label, hint, children }) {
  return (
    <div className="mb-6">
      <div className="mb-1.5">
        <div className="text-sm font-semibold" style={{ color: C.ink }}>{label}</div>
        {hint ? <div className="text-xs mt-0.5" style={{ color: C.inkFaint }}>{hint}</div> : null}
      </div>
      {children}
    </div>
  );
}

function TextArea({ value, onChange, placeholder, rows = 3 }) {
  return (
    <textarea
      value={value}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      rows={rows}
      className="w-full rounded-xl px-3 py-2.5 text-sm leading-relaxed resize-none focus:outline-none"
      style={{ background: C.paper, border: `1px solid ${C.border}`, color: C.ink }}
    />
  );
}

function IntensityRow({ row, onName, onValue, onRemove, namePlaceholder, removable }) {
  return (
    <div className="rounded-xl p-3 mb-2" style={{ background: C.paper, border: `1px solid ${C.border}` }}>
      <div className="flex items-center gap-2 mb-2">
        <input
          value={row.name}
          onChange={(e) => onName(e.target.value)}
          placeholder={namePlaceholder}
          className="flex-1 bg-transparent text-sm font-medium focus:outline-none"
          style={{ color: C.ink }}
        />
        {removable ? (
          <button onClick={onRemove} className="p-1 rounded-full opacity-60 hover:opacity-100">
            <XIcon size={15} color={C.inkSoft} />
          </button>
        ) : null}
      </div>
      <div className="flex items-center gap-3">
        <input
          type="range"
          min={0}
          max={100}
          step={5}
          value={row.value}
          onChange={(e) => onValue(Number(e.target.value))}
          className="intensity-range flex-1"
          style={{ background: `linear-gradient(to right, ${C.cool} 0%, ${gaugeColor(row.value)} ${row.value}%, #E2E8EE ${row.value}%, #E2E8EE 100%)` }}
        />
        <span className="text-xs font-mono w-7 text-right" style={{ color: C.inkSoft }}>{row.value}</span>
      </div>
    </div>
  );
}

function NameRow({ row, onName, onRemove, namePlaceholder, removable }) {
  return (
    <div className="flex items-center gap-2 mb-2">
      <input
        value={row.name}
        onChange={(e) => onName(e.target.value)}
        placeholder={namePlaceholder}
        className="flex-1 rounded-xl px-3 py-2.5 text-sm focus:outline-none"
        style={{ background: C.paper, border: `1px solid ${C.border}`, color: C.ink }}
      />
      {removable ? (
        <button onClick={onRemove} className="p-1 rounded-full opacity-60 hover:opacity-100 flex-shrink-0">
          <XIcon size={15} color={C.inkSoft} />
        </button>
      ) : null}
    </div>
  );
}

function MiniGauge({ value }) {
  return (
    <div className="flex items-center gap-2">
      <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background: "#E2E8EE" }}>
        <div className="h-full rounded-full" style={{ width: `${value}%`, background: gaugeColor(value) }} />
      </div>
      <span className="text-[11px] font-mono" style={{ color: C.inkFaint }}>{value}</span>
    </div>
  );
}

/* ---------- views ---------- */
function ListView({ entries, onNew, onSelect, onExport, onImport, importMessage }) {
  const sorted = entries.slice().sort((a, b) => {
    const diff = new Date(b.date) - new Date(a.date);
    return diff !== 0 ? diff : b.id.localeCompare(a.id);
  });
  return (
    <div className="flex flex-col min-h-screen">
      <div className="px-5 pt-7 pb-4">
        <div className="text-xs font-semibold tracking-wide" style={{ color: C.cool }}>THOUGHT RECORD</div>
        <h1 className="serif text-2xl mt-1" style={{ color: C.ink }}>思考記録</h1>
        <p className="text-xs mt-1" style={{ color: C.inkFaint }}>状況・自動思考・気分・身体反応・行動を書き留める</p>
        <div className="flex items-center gap-4 mt-3">
          <button onClick={onExport} className="inline-flex items-center gap-1 text-xs font-medium" style={{ color: C.cool }}>
            <DownloadIcon size={14} /> バックアップを書き出す
          </button>
          <label className="inline-flex items-center gap-1 text-xs font-medium cursor-pointer" style={{ color: C.cool }}>
            <UploadIcon size={14} /> 読み込む
            <input
              type="file"
              accept="application/json"
              className="hidden"
              onChange={(e) => {
                if (e.target.files && e.target.files[0]) onImport(e.target.files[0]);
                e.target.value = "";
              }}
            />
          </label>
        </div>
        {importMessage ? <div className="text-xs mt-2" style={{ color: C.inkSoft }}>{importMessage}</div> : null}
      </div>


      <div className="flex-1 px-5 pb-28">
        {sorted.length === 0 ? (
          <div className="mt-10 text-center">
            <p className="text-sm mb-4" style={{ color: C.inkSoft }}>
              まだ記録がありません。気になる出来事があったら、ここに書き留めてみましょう。
            </p>
            <button onClick={onNew} className="inline-flex items-center gap-1.5 px-4 py-2.5 rounded-full text-sm font-medium" style={{ background: C.ink, color: "#fff" }}>
              <Plus size={16} /> 最初の記録をつける
            </button>
          </div>
        ) : (
          <div className="space-y-3">
            {sorted.map((e) => {
              const topEmotion = e.emotions.filter((em) => em.name).sort((a, b) => b.value - a.value)[0];
              return (
                <button key={e.id} onClick={() => onSelect(e.id)} className="w-full text-left rounded-2xl p-4" style={{ background: C.card, border: `1px solid ${C.border}` }}>
                  <div className="text-xs serif italic mb-1" style={{ color: C.inkFaint }}>{formatDateDisplay(e.date)}</div>
                  <div className="text-sm mb-2 line-clamp-2" style={{ color: C.ink }}>{e.situation || "(状況の記入なし)"}</div>
                  {topEmotion ? (
                    <div className="flex items-center gap-2">
                      <span className="text-xs flex-shrink-0" style={{ color: C.inkSoft }}>{topEmotion.name}</span>
                      <div className="flex-1 max-w-[120px]"><MiniGauge value={topEmotion.value} /></div>
                    </div>
                  ) : null}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {sorted.length > 0 ? (
        <div className="fixed bottom-0 left-0 right-0 px-5 pb-6 pt-3" style={{ background: `linear-gradient(to top, ${C.paper} 60%, transparent)` }}>
          <div className="max-w-md mx-auto">
            <button onClick={onNew} className="w-full flex items-center justify-center gap-1.5 py-3.5 rounded-full text-sm font-medium shadow-lg" style={{ background: C.ink, color: "#fff" }}>
              <Plus size={16} /> 記録する
            </button>
          </div>
        </div>
      ) : null}
    </div>
  );
}

function FormView({ formData, onField, onAddRow, onUpdateRow, onRemoveRow, onSubmit, onCancel, isEditing, error }) {
  return (
    <div className="flex flex-col min-h-screen">
      <div className="sticky top-0 z-10 flex items-center gap-3 px-4 py-3" style={{ background: C.paper, borderBottom: `1px solid ${C.border}` }}>
        <button onClick={onCancel} className="p-1.5 -ml-1.5 rounded-full"><ChevronLeft size={20} color={C.ink} /></button>
        <h2 className="text-sm font-semibold" style={{ color: C.ink }}>{isEditing ? "記録を編集" : "新しい記録"}</h2>
      </div>

      <div className="flex-1 px-5 pt-5 pb-28">
        <Field label="日付">
          <input type="date" value={formData.date} onChange={(e) => onField("date", e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-sm focus:outline-none" style={{ background: C.paper, border: `1px solid ${C.border}`, color: C.ink }} />
        </Field>

        <Field label="状況" hint="いつ、どこで、何があった?">
          <TextArea value={formData.situation} onChange={(v) => onField("situation", v)} placeholder="例: 会議で自分の意見を否定された" />
          {error ? <div className="text-xs mt-1" style={{ color: C.danger }}>状況を入力してください</div> : null}
        </Field>

        <Field label="自動思考" hint="そのとき頭に浮かんだこと">
          <TextArea value={formData.automaticThought} onChange={(v) => onField("automaticThought", v)} placeholder="例: また自分はダメだと思われた" />
        </Field>

        <Field label="気分" hint="そのときの感情と強さ(0-100)">
          {formData.emotions.map((row) => (
            <IntensityRow key={row.id} row={row} namePlaceholder="例: 不安、悲しみ" removable={formData.emotions.length > 1}
              onName={(v) => onUpdateRow("emotions", row.id, "name", v)}
              onValue={(v) => onUpdateRow("emotions", row.id, "value", v)}
              onRemove={() => onRemoveRow("emotions", row.id)} />
          ))}
          <button onClick={() => onAddRow("emotions")} className="text-xs font-medium mt-1" style={{ color: C.cool }}>+ 感情を追加</button>
        </Field>

        <Field label="身体反応" hint="体に出た感覚と強さ(0-100)">
          {formData.physicalReactions.map((row) => (
            <NameRow key={row.id} row={row} namePlaceholder="例: 動悸、肩のこわばり" removable={formData.physicalReactions.length > 1}
              onName={(v) => onUpdateRow("physicalReactions", row.id, "name", v)}
              onRemove={() => onRemoveRow("physicalReactions", row.id)} />
          ))}
          <button onClick={() => onAddRow("physicalReactions")} className="text-xs font-medium mt-1" style={{ color: C.cool }}>+ 身体反応を追加</button>
        </Field>

        <Field label="行動" hint="実際にとった、またはとりたくなった行動">
          <TextArea value={formData.behavior} onChange={(v) => onField("behavior", v)} placeholder="例: その場で黙り込んだ" />
        </Field>

        <div className="my-6 h-px" style={{ background: C.border }} />

        <Field label="根拠" hint="その自動思考を裏付ける事実">
          <TextArea value={formData.evidenceFor} onChange={(v) => onField("evidenceFor", v)} rows={2} />
        </Field>

        <Field label="反証" hint="その自動思考に反する事実">
          <TextArea value={formData.evidenceAgainst} onChange={(v) => onField("evidenceAgainst", v)} rows={2} />
        </Field>

        <Field label="バランス思考" hint="より現実的でバランスの取れた考え方">
          <div className="rounded-xl p-0.5" style={{ background: C.amberBg }}>
            <textarea value={formData.balancedThought} onChange={(e) => onField("balancedThought", e.target.value)} rows={3} placeholder="根拠と反証を踏まえると…" className="w-full rounded-xl px-3 py-2.5 text-sm leading-relaxed resize-none focus:outline-none bg-transparent" style={{ border: `1px solid ${C.amber}`, color: C.ink }} />
          </div>
        </Field>
      </div>

      <div className="fixed bottom-0 left-0 right-0 px-5 pb-6 pt-3" style={{ background: `linear-gradient(to top, ${C.paper} 65%, transparent)` }}>
        <div className="max-w-md mx-auto flex gap-2">
          <button onClick={onCancel} className="px-5 py-3.5 rounded-full text-sm font-medium" style={{ background: C.card, color: C.inkSoft, border: `1px solid ${C.border}` }}>キャンセル</button>
          <button onClick={onSubmit} className="flex-1 flex items-center justify-center gap-1.5 py-3.5 rounded-full text-sm font-medium shadow-lg" style={{ background: C.ink, color: "#fff" }}>
            <Check size={16} /> 保存する
          </button>
        </div>
      </div>
    </div>
  );
}

function DetailView({ entry, onBack, onEdit, onDelete, confirmingDelete, onConfirmDelete, onCancelDelete }) {
  const Section = ({ label, content, accent }) =>
    content ? (
      <div className="mb-5">
        <div className="text-xs font-semibold mb-1" style={{ color: accent || C.cool }}>{label}</div>
        <div className="text-sm leading-relaxed whitespace-pre-wrap" style={{ color: C.ink }}>{content}</div>
      </div>
    ) : null;

  return (
    <div className="flex flex-col min-h-screen">
      <div className="sticky top-0 z-10 flex items-center justify-between px-4 py-3" style={{ background: C.paper, borderBottom: `1px solid ${C.border}` }}>
        <button onClick={onBack} className="p-1.5 -ml-1.5 rounded-full"><ChevronLeft size={20} color={C.ink} /></button>
        <div className="flex items-center gap-1">
          <button onClick={onEdit} className="p-2 rounded-full"><Pencil size={17} color={C.inkSoft} /></button>
          <button onClick={onDelete} className="p-2 rounded-full"><Trash2 size={17} color={C.danger} /></button>
        </div>
      </div>

      {confirmingDelete ? (
        <div className="mx-5 mt-4 p-3 rounded-xl flex items-center justify-between" style={{ background: C.dangerBg }}>
          <span className="text-sm" style={{ color: C.danger }}>この記録を削除しますか?</span>
          <div className="flex gap-2 flex-shrink-0 ml-3">
            <button onClick={onCancelDelete} className="text-xs px-2.5 py-1.5 rounded-full" style={{ background: C.card }}>キャンセル</button>
            <button onClick={onConfirmDelete} className="text-xs px-2.5 py-1.5 rounded-full text-white" style={{ background: C.danger }}>削除する</button>
          </div>
        </div>
      ) : null}

      <div className="px-5 pt-5 pb-10">
        <div className="text-xs serif italic mb-5" style={{ color: C.inkFaint }}>{formatDateDisplay(entry.date)}</div>

        <Section label="状況" content={entry.situation} />
        <Section label="自動思考" content={entry.automaticThought} />

        {entry.emotions.some((e) => e.name) ? (
          <div className="mb-5">
            <div className="text-xs font-semibold mb-2" style={{ color: C.cool }}>気分</div>
            {entry.emotions.filter((e) => e.name).map((e) => (
              <div key={e.id} className="flex items-center gap-2 mb-1.5">
                <span className="text-sm w-20 flex-shrink-0" style={{ color: C.ink }}>{e.name}</span>
                <div className="flex-1"><MiniGauge value={e.value} /></div>
              </div>
            ))}
          </div>
        ) : null}

        {entry.physicalReactions.some((e) => e.name) ? (
          <div className="mb-5">
            <div className="text-xs font-semibold mb-2" style={{ color: C.cool }}>身体反応</div>
            <div className="flex flex-wrap gap-1.5">
              {entry.physicalReactions.filter((e) => e.name).map((e) => (
                <span key={e.id} className="text-sm px-2.5 py-1 rounded-full" style={{ background: C.paper, color: C.ink, border: `1px solid ${C.border}` }}>{e.name}</span>
              ))}
            </div>
          </div>
        ) : null}

        <Section label="行動" content={entry.behavior} />
        <div className="h-px my-5" style={{ background: C.border }} />
        <Section label="根拠" content={entry.evidenceFor} />
        <Section label="反証" content={entry.evidenceAgainst} />
        {entry.balancedThought ? (
          <div className="rounded-xl p-3.5" style={{ background: C.amberBg, border: `1px solid ${C.amber}` }}>
            <div className="text-xs font-semibold mb-1" style={{ color: C.amber }}>バランス思考</div>
            <div className="text-sm leading-relaxed whitespace-pre-wrap" style={{ color: C.ink }}>{entry.balancedThought}</div>
          </div>
        ) : null}
      </div>
    </div>
  );
}

/* ---------- app ---------- */
function App() {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("list");
  const [editingId, setEditingId] = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  const [formData, setFormData] = useState(emptyFormData());
  const [formError, setFormError] = useState(false);
  const [confirmingDelete, setConfirmingDelete] = useState(false);
  const [importMessage, setImportMessage] = useState("");

  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get("cbt-entries");
        if (result && result.value) setEntries(JSON.parse(result.value));
      } catch (e) {
        setEntries([]);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  async function persist(next) {
    setEntries(next);
    try {
      await window.storage.set("cbt-entries", JSON.stringify(next));
    } catch (e) {
      console.error("failed to save", e);
    }
  }

  function openNew() {
    setFormData(emptyFormData());
    setEditingId(null);
    setFormError(false);
    setView("form");
  }

  function openEdit(entry) {
    setFormData({
      ...entry,
      date: entry.date ? entry.date.slice(0, 10) : toDateInputValue(),
      emotions: entry.emotions.length ? entry.emotions : [{ id: genId(), name: "", value: 50 }],
      physicalReactions: entry.physicalReactions.length ? entry.physicalReactions : [{ id: genId(), name: "" }],
    });
    setEditingId(entry.id);
    setFormError(false);
    setView("form");
  }

  function selectEntry(id) {
    setSelectedId(id);
    setConfirmingDelete(false);
    setView("detail");
  }

  function fieldUpdate(key, value) {
    setFormData((p) => ({ ...p, [key]: value }));
  }
  function addRow(listKey) {
    const newRow = listKey === "physicalReactions" ? { id: genId(), name: "" } : { id: genId(), name: "", value: 50 };
    setFormData((p) => ({ ...p, [listKey]: [...p[listKey], newRow] }));
  }
  function updateRow(listKey, id, field, value) {
    setFormData((p) => ({ ...p, [listKey]: p[listKey].map((r) => (r.id === id ? { ...r, [field]: value } : r)) }));
  }
  function removeRow(listKey, id) {
    setFormData((p) => ({ ...p, [listKey]: p[listKey].filter((r) => r.id !== id) }));
  }

  function submitForm() {
    if (!formData.situation.trim()) {
      setFormError(true);
      return;
    }
    const cleaned = {
      ...formData,
      emotions: formData.emotions.filter((r) => r.name.trim()),
      physicalReactions: formData.physicalReactions.filter((r) => r.name.trim()),
    };
    let next;
    if (editingId) {
      next = entries.map((e) => (e.id === editingId ? { ...cleaned, id: editingId } : e));
    } else {
      next = [...entries, { ...cleaned, id: genId() }];
    }
    persist(next);
    setView("list");
  }

  function requestDelete() {
    setConfirmingDelete(true);
  }
  function confirmDelete() {
    const next = entries.filter((e) => e.id !== selectedId);
    persist(next);
    setConfirmingDelete(false);
    setView("list");
  }

  function exportData() {
    try {
      const blob = new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `thought-record-backup-${toDateInputValue()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setImportMessage("バックアップファイルを書き出しました");
    } catch (e) {
      setImportMessage("書き出しに失敗しました");
    }
    setTimeout(() => setImportMessage(""), 4000);
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!Array.isArray(parsed)) throw new Error("invalid");
        const existingIds = new Set(entries.map((en) => en.id));
        const toAdd = parsed.filter((en) => en && en.id && !existingIds.has(en.id));
        persist([...entries, ...toAdd]);
        setImportMessage(`${toAdd.length}件の記録を読み込みました`);
      } catch (err) {
        setImportMessage("ファイルの読み込みに失敗しました(形式が正しくない可能性があります)");
      }
      setTimeout(() => setImportMessage(""), 4000);
    };
    reader.readAsText(file);
  }

  const selectedEntry = entries.find((e) => e.id === selectedId);

  return (
    <div style={{ background: C.paper, minHeight: "100vh" }}>
      <div className="h-1" style={{ background: `linear-gradient(to right, ${C.cool}, ${C.amber}, ${C.warm})` }} />
      <div className="max-w-md mx-auto" style={{ background: C.paper }}>
        {loading ? (
          <div className="min-h-screen flex items-center justify-center"><span className="text-sm" style={{ color: C.inkFaint }}>読み込み中…</span></div>
        ) : view === "list" ? (
          <ListView entries={entries} onNew={openNew} onSelect={selectEntry} onExport={exportData} onImport={importData} importMessage={importMessage} />
        ) : view === "form" ? (
          <FormView formData={formData} onField={fieldUpdate} onAddRow={addRow} onUpdateRow={updateRow} onRemoveRow={removeRow} onSubmit={submitForm} onCancel={() => setView(editingId ? "detail" : "list")} isEditing={!!editingId} error={formError} />
        ) : view === "detail" && selectedEntry ? (
          <DetailView entry={selectedEntry} onBack={() => setView("list")} onEdit={() => openEdit(selectedEntry)} onDelete={requestDelete} confirmingDelete={confirmingDelete} onConfirmDelete={confirmDelete} onCancelDelete={() => setConfirmingDelete(false)} />
        ) : (
          <div className="min-h-screen flex items-center justify-center"><span className="text-sm" style={{ color: C.inkFaint }}>記録が見つかりません</span></div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  (function () {
    var source = document.getElementById("app-source").textContent;
    var output = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]],
    }).code;
    var script = document.createElement("script");
    script.text = output;
    document.body.appendChild(script);
  })();
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
